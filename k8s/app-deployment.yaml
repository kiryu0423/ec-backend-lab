apiVersion: apps/v1
kind: Deployment
metadata:
  name: ec-demo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ec-demo-api
  template:
    metadata:
      labels:
        app: ec-demo-api
    spec:
      containers:
        - name: ec-demo-api
          image: ec-demo-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ec-demo-api-config
