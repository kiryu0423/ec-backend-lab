services:
  postgres:
    image: postgres:17
    container_name: product-api-postgres
    environment:
      POSTGRES_DB: product_api
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: product_password
    ports:
      - "5432:5432"
    volumes:
      - product-api-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_user -d product_api"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  product-api-postgres-data:
